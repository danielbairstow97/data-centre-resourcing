# =============================================================================
# Cooling scenario: Evaporative Cooling Tower (wet cooling)
# =============================================================================
# Lowest electrical overhead of any mechanical cooling option.
# Significant water consumption via evaporation — sensitive to water cost caps.
#
# Typical data centre application: chilled-water plant with cooling tower.
# WUE:  ~1.5–2.0 L/kWh_it
# PUE contribution: ~1.05–1.10 (pump + fan draw)
#
# High-level metrics (approximate, flat-load 1 MW_it):
#   Electrical overhead : 50 kW per MW_it
#   Water consumption   : 1,800 L/MWh_it ≈ 0.5 L/s per MW_it continuous
#   CAPEX               : $80k/MW_it
# =============================================================================

name: Cooling Tower (wet evaporative)

technologies:
  - name: cooling_tower
    fraction_of_load: 1.0
    elec_MW_per_MW_heat: 0.05       # pump + cooling tower fan draw
    water_L_per_MWh_heat: 1800.0   # evaporative loss (makeup not included)
    capex_per_MW_it: 80000
    opex_per_MW_year: 5000
    lifetime_years: 20
